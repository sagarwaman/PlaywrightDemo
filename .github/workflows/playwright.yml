name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  
jobs:
   test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # --- ADD THIS: Run the whole job inside the Playwright container ---
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Check playwright version
      run: npx playwright --version

    # --- WE COMPLETELY REMOVE THE "INSTALL PLAYWRIGHT BROWSERS" STEP ---

    - name: Run Playwright tests
      run: npx playwright test tests/dropdown.spec.ts 

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30